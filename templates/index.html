<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멍거 격자모델 주식 분석기</title>
    <!-- marked.js: 마크다운 렌더링 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, 'Noto Sans KR', sans-serif;
            background: #0b0b14;
            color: #d4d4d8;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── 헤더 ── */
        .header {
            background: linear-gradient(135deg, #111827 0%, #1e293b 100%);
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        .header h1 {
            font-size: 2rem;
            color: #f8fafc;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0.4rem;
        }

        /* ── 검색 ── */
        .search-section {
            max-width: 620px;
            margin: 2.5rem auto;
            padding: 0 1rem;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
        }

        .search-box input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            font-size: 1.05rem;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #1e293b;
            color: #f1f5f9;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: #6366f1; }
        .search-box input::placeholder { color: #475569; }

        .search-box button {
            padding: 0.85rem 1.6rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: #6366f1;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .search-box button:hover { background: #4f46e5; }
        .search-box button:disabled { background: #334155; cursor: not-allowed; }

        .examples {
            margin-top: 0.8rem;
            color: #64748b;
            font-size: 0.85rem;
        }

        .examples span {
            cursor: pointer;
            color: #818cf8;
            margin: 0 0.3rem;
            transition: color 0.15s;
        }

        .examples span:hover { color: #a5b4fc; text-decoration: underline; }

        /* ── 로딩 ── */
        .loading {
            display: none;
            text-align: center;
            padding: 4rem 1rem;
        }

        .loading.active { display: block; }

        .loading h3 {
            margin-bottom: 2rem;
            color: #e2e8f0;
            font-size: 1.15rem;
        }

        .agent-progress {
            max-width: 420px;
            margin: 0 auto;
            text-align: left;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.65rem 1rem;
            margin: 0.3rem 0;
            border-radius: 8px;
            background: #1e293b;
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .agent-status .icon { font-size: 1.2rem; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .checkmark {
            color: #22c55e;
            font-size: 1.1rem;
            margin-left: auto;
            font-weight: 700;
        }

        /* ── 에러 ── */
        .error-msg {
            display: none;
            text-align: center;
            color: #f87171;
            padding: 2rem;
            font-size: 1.05rem;
        }

        .error-msg.active { display: block; }

        /* ── 결과 ── */
        .results {
            display: none;
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 4rem;
        }

        .results.active { display: block; }

        .back-btn {
            display: inline-block;
            margin: 0.5rem 0 1.2rem;
            padding: 0.5rem 1rem;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }

        .back-btn:hover { background: #334155; color: #e2e8f0; }

        /* ── 탭 ── */
        .tab-bar {
            display: flex;
            gap: 0.2rem;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.75rem 1.1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #64748b;
            font-size: 0.88rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .tab:hover { color: #cbd5e1; }

        .tab.active {
            color: #a5b4fc;
            border-bottom-color: #6366f1;
        }

        /* ── 마크다운 콘텐츠 ── */
        .tab-content {
            display: none;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 2rem 2.2rem;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .tab-content.active { display: block; }

        /* 제목 */
        .tab-content h1 {
            font-size: 1.6rem;
            color: #f1f5f9;
            margin: 1.8rem 0 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e293b;
        }

        .tab-content h1:first-child { margin-top: 0; }

        .tab-content h2 {
            font-size: 1.3rem;
            color: #e2e8f0;
            margin: 1.6rem 0 0.6rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #1e293b44;
        }

        .tab-content h3 {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin: 1.3rem 0 0.5rem;
        }

        .tab-content h4 {
            font-size: 1rem;
            color: #94a3b8;
            margin: 1rem 0 0.4rem;
        }

        /* 본문 */
        .tab-content p {
            margin: 0.6rem 0;
            color: #d4d4d8;
        }

        .tab-content strong { color: #f1f5f9; }
        .tab-content em { color: #a5b4fc; font-style: italic; }

        /* 리스트 */
        .tab-content ul, .tab-content ol {
            margin: 0.5rem 0 0.8rem 1.5rem;
        }

        .tab-content li {
            margin: 0.35rem 0;
            color: #d4d4d8;
        }

        .tab-content li::marker { color: #6366f1; }

        /* 테이블 */
        .tab-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .tab-content thead th {
            background: #1e293b;
            color: #a5b4fc;
            font-weight: 600;
            padding: 0.7rem 1rem;
            text-align: left;
            border-bottom: 2px solid #334155;
        }

        .tab-content tbody td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #1e293b;
            color: #d4d4d8;
        }

        .tab-content tbody tr:hover {
            background: #1e293b66;
        }

        /* 코드 블록 */
        .tab-content pre {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            overflow-x: auto;
            margin: 0.8rem 0;
            font-size: 0.88rem;
        }

        .tab-content code {
            font-family: 'Consolas', 'Fira Code', monospace;
            color: #a5b4fc;
        }

        .tab-content pre code {
            color: #e2e8f0;
            background: none;
            padding: 0;
        }

        .tab-content :not(pre) > code {
            background: #1e293b;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.88em;
        }

        /* 구분선 */
        .tab-content hr {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 1.8rem 0;
        }

        /* 인용문 */
        .tab-content blockquote {
            border-left: 3px solid #6366f1;
            padding: 0.5rem 1rem;
            margin: 0.8rem 0;
            background: #1e293b44;
            border-radius: 0 6px 6px 0;
            color: #94a3b8;
        }

        /* 반응형 */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.4rem; }
            .tab-content { padding: 1.2rem 1rem; }
            .tab-content table { font-size: 0.8rem; }
            .tab-content thead th, .tab-content tbody td { padding: 0.4rem 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Munger Lattice Stock Analyzer</h1>
        <p>찰리 멍거의 격자모델 기반 AI 멀티에이전트 주식 분석</p>
    </div>

    <div class="search-section" id="searchSection">
        <div class="search-box">
            <input type="text" id="stockInput" placeholder="종목명 또는 티커 입력 (예: 삼성전자, AAPL)"
                   onkeydown="if(event.key==='Enter') analyze()">
            <button onclick="analyze()" id="analyzeBtn">분석 시작</button>
        </div>
        <div class="examples">
            예시:
            <span onclick="setQuery('삼성전자')">삼성전자</span>
            <span onclick="setQuery('AAPL')">AAPL</span>
            <span onclick="setQuery('NVDA')">NVDA</span>
            <span onclick="setQuery('네이버')">네이버</span>
            <span onclick="setQuery('TSLA')">TSLA</span>
        </div>
    </div>

    <div class="loading" id="loading">
        <h3 id="loadingTitle">분석 중...</h3>
        <div class="agent-progress" id="agentProgress">
            <div class="agent-status"><span class="icon">⚛️</span> 물리학 분석관 <span class="spinner" id="sp1"></span></div>
            <div class="agent-status"><span class="icon">🧬</span> 생물학 분석관 <span class="spinner" id="sp2"></span></div>
            <div class="agent-status"><span class="icon">📊</span> 경제학 분석관 <span class="spinner" id="sp3"></span></div>
            <div class="agent-status"><span class="icon">🧠</span> 심리학 분석관 <span class="spinner" id="sp4"></span></div>
            <div class="agent-status"><span class="icon">🔄</span> 역발상 분석관 <span class="spinner" id="sp5"></span></div>
        </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="results" id="results">
        <button class="back-btn" onclick="goBack()">← 다시 검색</button>
        <div class="tab-bar" id="tabBar"></div>
        <div id="tabContents"></div>
    </div>

    <script>
        // marked.js 설정
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function setQuery(q) {
            document.getElementById('stockInput').value = q;
        }

        function goBack() {
            document.getElementById('results').classList.remove('active');
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('searchSection').style.display = 'block';
            document.getElementById('stockInput').value = '';
            document.getElementById('stockInput').focus();
        }

        async function analyze() {
            const query = document.getElementById('stockInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;

            document.getElementById('searchSection').style.display = 'none';
            document.getElementById('results').classList.remove('active');
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('loading').classList.add('active');
            document.getElementById('loadingTitle').textContent = `"${query}" 분석 중...`;

            for (let i = 1; i <= 5; i++) {
                const sp = document.getElementById('sp' + i);
                sp.className = 'spinner';
                sp.textContent = '';
            }

            try {
                const resp = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await resp.json();

                if (data.error) throw new Error(data.error);

                for (let i = 1; i <= 5; i++) {
                    const sp = document.getElementById('sp' + i);
                    sp.className = 'checkmark';
                    sp.textContent = '✓';
                }

                setTimeout(() => {
                    document.getElementById('loading').classList.remove('active');
                    showResults(data);
                }, 500);

            } catch (err) {
                document.getElementById('loading').classList.remove('active');
                const errDiv = document.getElementById('errorMsg');
                errDiv.textContent = '오류: ' + err.message;
                errDiv.classList.add('active');
                document.getElementById('searchSection').style.display = 'block';
            }

            btn.disabled = false;
        }

        function showResults(data) {
            const tabBar = document.getElementById('tabBar');
            const tabContents = document.getElementById('tabContents');
            tabBar.innerHTML = '';
            tabContents.innerHTML = '';

            const tabs = [
                { name: '📋 종합 보고서', content: data.final_report },
                ...data.agent_results.map(a => ({
                    name: `${a.icon} ${a.name}`,
                    content: a.result
                }))
            ];

            tabs.forEach((tab, i) => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab' + (i === 0 ? ' active' : '');
                tabEl.textContent = tab.name;
                tabEl.onclick = () => switchTab(i);
                tabBar.appendChild(tabEl);

                const contentEl = document.createElement('div');
                contentEl.className = 'tab-content' + (i === 0 ? ' active' : '');
                contentEl.id = 'tab-' + i;
                contentEl.innerHTML = marked.parse(tab.content);
                tabContents.appendChild(contentEl);
            });

            document.getElementById('results').classList.add('active');
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === idx);
            });
            document.querySelectorAll('.tab-content').forEach((c, i) => {
                c.classList.toggle('active', i === idx);
            });
        }
    </script>
</body>
</html>
